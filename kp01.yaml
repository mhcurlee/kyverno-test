apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-github-signed-images-app-namespaces
spec:
  validationFailureAction: Enforce
  background: false
  webhookConfiguration:
    failurePolicy: Fail
    timeoutSeconds: 30
  rules:
    - name: verify-github-actions-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  nstype: app
      verifyImages:
        - imageReferences:
            - "*"
          required: true
          mutateDigest: true
          verifyDigest: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subject: "https://github.com/mhcurlee/kyverno-test/.github/workflows/build-signed-image.yaml@refs/heads/main"
                    rekor:
                      url: "https://rekor.sigstore.dev"
