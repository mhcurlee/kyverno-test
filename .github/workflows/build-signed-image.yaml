name: Build, Push, and Sign Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: docker.io/mhcurlee/signed-image-test

jobs:
  build-push-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        run: |
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest.Digest}}' | tr -d '"')

          echo "IMAGE=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMAGE_DIGEST=${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign image keylessly
        run: |
          cosign sign --yes "${{ steps.build.outputs.IMAGE_DIGEST }}"

      - name: Show signed image
        run: |
          echo "${{ steps.build.outputs.IMAGE_DIGEST }}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/build-signed-image.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.build.outputs.IMAGE_DIGEST }}"